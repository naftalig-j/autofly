name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sound-transfer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JFrog Fly
        uses: jfrog/fly-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        # dist/ is now on the runner; the Docker step below packages it into nginx

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/sound-transfer:${{ github.sha }}" \
            -t "${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/sound-transfer:latest" \
            .

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push "${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/sound-transfer:${{ github.sha }}"
          docker push "${{ env.FLY_REGISTRY_SUBDOMAIN }}/docker/sound-transfer:latest"
